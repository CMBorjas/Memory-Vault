# ╔══════════════════════════════════════════════════════════════╗
# ║  Anti-Gravity Knowledge Engine — Book Configuration        ║
# ║  Each book/module is assigned a biological kingdom and     ║
# ║  sensory profile to prevent "memory bleeding" between      ║
