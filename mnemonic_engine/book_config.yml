    kingdom: Insects
    aesthetic: Chitinous/Swarming
    scent_primary: Ozone
    scent_secondary: Sulfur
    color_palette:
    - '#D6CDB8'
    - '#F2E9D8'
    - '#A8A092'
    visual_keywords:
    - chitinous exoskeletons
    - swarming columns
    - compound eyes
    - mandible clicks
    - hive lattices
