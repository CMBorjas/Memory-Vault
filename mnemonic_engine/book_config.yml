    aesthetic: Shifting/Ink-Cloud
    scent_primary: Brine
    scent_secondary: Iodine
    color_palette:
    - '#3F4C5C'
    - '#27323A'
    - '#5D7482'
    visual_keywords:
    - chromatophore pulses
    - tentacle branching
    - ink explosions
    - sucker patterns
