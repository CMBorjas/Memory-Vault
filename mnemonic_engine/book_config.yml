# ╚══════════════════════════════════════════════════════════════╝

books:
  Networking:
    kingdom: Otter
    aesthetic: decrepited
    scent_primary: Orange
    scent_secondary: Ozone
    color_palette:
    - '#658496'
    - '#4A5A6B'
    - '#8AA8BA'
    visual_keywords:
    - translucent newts
    - rotting lilies
    - bruised skin
    - tearing membranes
    - continental bridges
    sensory_description: 'The heavy, suffocatingly sweet smell of wilting funeral
      flowers mixed with the sharp, eye-watering ammonia of a reptile tank that hasn''t
      been cleaned in months.

      '
    mc_profile: Lizard
    plot: Basking
